name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CI: true
  SKIP_ENV_VALIDATION: "1"
  DATABASE_URL: "mongodb://localhost:27017/editron-ci"
  AUTH_SECRET: "ci-auth-secret"
  AUTH_GITHUB_ID: "ci-github-id"
  AUTH_GITHUB_SECRET: "ci-github-secret"
  AUTH_GOOGLE_ID: "ci-google-id"
  AUTH_GOOGLE_SECRET: "ci-google-secret"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
